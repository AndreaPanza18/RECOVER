services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/models:/app/models
    ports:
      - "8000:8000"



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: recover_frontend:latest
    ports:
      - "80:80"
    volumes:
      - node_modules:/app/node_modules

volumes:
  node_modules:
